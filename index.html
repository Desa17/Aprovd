<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
body { font-family: 'Roboto', sans-serif; margin:0; background:#f5f5f5; }
header{position:fixed;top:0;width:100%;background:#fff;text-align:center;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);z-index:10;}
#titulo-happy{font-family:'Fredoka One',cursive;font-size:2rem;}
.contenedor{max-width:1200px;margin:100px auto 30px;padding:0 15px;}
.productos-container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.producto{width:300px;background:#fff;border-radius:12px;padding:15px;box-shadow:0 6px 15px rgba(255,0,47,0.15);transition:0.2s;}
.producto:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(255,0,47,0.25);}
.producto img{width:100%;border-radius:12px;cursor:pointer;}
button{padding:10px;border:none;border-radius:8px;background:#FF002F;color:#fff;font-weight:500;cursor:pointer;margin-top:5px;width:100%;}
button:disabled{background:#ccc;cursor:not-allowed;}
#zoomModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:100;}
#zoomModal img{max-width:90%;max-height:90%;border-radius:12px;cursor:zoom-out;}
.carrito-modal{display:none;position:fixed;top:0;right:0;width:350px;height:100%;background:#fff;box-shadow:-2px 0 10px rgba(0,0,0,0.2);z-index:1000;padding:15px;overflow-y:auto;}
.carrito-item{display:flex;gap:10px;margin-bottom:10px;align-items:center;}
.carrito-item img{width:50px;height:50px;object-fit:cover;border-radius:6px;}
#carritoBtn{position:fixed;bottom:20px;right:20px;background:#FF002F;color:#fff;padding:12px;border-radius:50%;cursor:pointer;z-index:1000;}
</style>
</head>
<body>
<header><h1 id="titulo-happy">Happy Store</h1></header>
<div class="contenedor">
  <div id="productos" class="productos-container"></div>
</div>

<div id="zoomModal"><img id="zoomImg" src="" alt="Zoom"></div>

<div id="carritoBtn">🛒 <span id="cantidadCarrito">0</span></div>
<div id="carritoModal" class="carrito-modal">
  <h2>Carrito</h2>
  <div id="carritoItems"></div>
  <p>Total: S/<span id="totalCarrito">0</span></p>
  <button id="checkoutCarrito">Enviar a WhatsApp</button>
  <button id="cerrarCarrito">Cerrar</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  databaseURL: "TU_DATABASE_URL",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let listaProductos=[], carrito=[];

// ================== CARGAR PRODUCTOS ==================
async function cargarProductos(){
  const snapshot = await db.ref("productos").once("value");
  const data = snapshot.val();
  listaProductos = Object.keys(data || {}).map(k => {
    return {codigo:k, ...data[k]};
  });
  mostrarProductos();
}

function mostrarProductos(){
  const contenedor=document.getElementById("productos");
  contenedor.innerHTML="";
  listaProductos.forEach(prod=>{
    let div=document.createElement("div");
    div.className="producto";
    let estadoText="";
    let disabled=false;
    if(prod.estado==="reservado"){estadoText="Reservado";disabled=true;}
    else if(prod.estado==="vendido"){estadoText="Vendido";disabled=true;}
    else{estadoText="Comprar";disabled=false;}
    div.innerHTML=`
      <img src="${prod.imagenes[0]}" alt="${prod.nombre}" onclick="zoomImagen('${prod.imagenes[0]}')">
      <h3>${prod.nombre}</h3>
      <p>${prod.descripcion}</p>
      <p>S/${prod.precio}</p>
      <button ${disabled?'disabled':''} onclick="agregarCarrito('${prod.codigo}')">${estadoText}</button>
    `;
    contenedor.appendChild(div);
  });
}

// ================== ZOOM IMAGEN ==================
function zoomImagen(url){
  const modal=document.getElementById("zoomModal");
  const img=document.getElementById("zoomImg");
  img.src=url;
  modal.style.display="flex";
}
document.getElementById("zoomModal").addEventListener("click",()=>{document.getElementById("zoomModal").style.display="none";});

// ================== CARRITO ==================
function actualizarCarrito(){
  document.getElementById("carritoItems").innerHTML="";
  let total=0;
  carrito.forEach(item=>{
    total+=item.precio*item.cantidad;
    let div=document.createElement("div");
    div.className="carrito-item";
    div.innerHTML=`
      <img src="${item.imagen}" alt="${item.nombre}">
      <div>${item.nombre}<br>S/${item.precio} x <input type="number" value="${item.cantidad}" min="1" style="width:40px" onchange="cambiarCantidad('${item.codigo}',this.value)"></div>
      <button onclick="quitarCarrito('${item.codigo}')">X</button>
    `;
    document.getElementById("carritoItems").appendChild(div);
  });
  document.getElementById("totalCarrito").textContent=total.toFixed(2);
  document.getElementById("cantidadCarrito").textContent=carrito.reduce((a,b)=>a+b.cantidad,0);
}

function agregarCarrito(codigo){
  const prod=listaProductos.find(p=>p.codigo===codigo);
  if(!prod) return;
  // cambiar estado en Firebase a reservado
  db.ref('productos/'+codigo+'/estado').set('reservado');
  prod.estado="reservado";
  let item=carrito.find(i=>i.codigo===codigo);
  if(item){item.cantidad++;}
  else{carrito.push({codigo:prod.codigo,nombre:prod.nombre,precio:prod.precio,imagen:prod.imagenes[0],cantidad:1});}
  actualizarCarrito();
  mostrarProductos();
}
function cambiarCantidad(codigo,val){
  let item=carrito.find(i=>i.codigo===codigo);
  if(item){item.cantidad=parseInt(val); if(item.cantidad<1) item.cantidad=1; actualizarCarrito();}
}
function quitarCarrito(codigo){
  carrito=carrito.filter(i=>i.codigo!==codigo);
  db.ref('productos/'+codigo+'/estado').set('disponible');
  const prod=listaProductos.find(p=>p.codigo===codigo); if(prod) prod.estado="disponible";
  actualizarCarrito(); mostrarProductos();
}

document.getElementById("carritoBtn").addEventListener("click",()=>{document.getElementById("carritoModal").style.display="block";});
document.getElementById("cerrarCarrito").addEventListener("click",()=>{document.getElementById("carritoModal").style.display="none";});

document.getElementById("checkoutCarrito").addEventListener("click",()=>{
  if(carrito.length===0) return alert("El carrito está vacío");
  let mensaje="Hola! Quiero comprar:\n";
  carrito.forEach(i=>{mensaje+=`${i.nombre} x${i.cantidad} - S/${i.precio*i.cantidad}\n`;});
  window.open(`https://wa.me/tu-numero?text=${encodeURIComponent(mensaje)}`,"_blank");
});

cargarProductos();
</script>
</body>
</html>
